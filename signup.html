<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bridge — Sign up</title>
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Inter:wght@600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #bdfffc;
            font-family: 'Inter', sans-serif;
        }

        .page {
            width: 1440px;
            max-width: 100%;
            min-height: 1024px;
            margin: 0 auto;
            position: relative;
        }

        .logo {
            position: absolute;
            top: 11px;
            left: 13px;
            font-family: 'Italiana', serif;
            font-size: 48px;
            font-weight: 400;
            letter-spacing: -0.96px;
            line-height: 1.2;
            color: #000;
        }

        .card-area {
            position: absolute;
            top: 244px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .card {
            width: 483px;
            height: 612px;
            background: #fff;
            border: 2px solid #000;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .card-hint {
            position: absolute;
            top: 24px;
            left: 15px;
            font-size: 48px;
            font-weight: 600;
            letter-spacing: -0.96px;
            line-height: 1.2;
            color: rgba(0, 0, 0, 0.14);
        }

        .card-title {
            font-size: 128px;
            font-weight: 600;
            letter-spacing: -2.56px;
            line-height: 1.2;
            color: #000;
        }

        .card-subtitle {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.64px;
            color: rgba(0, 0, 0, 0.4);
            margin-top: 8px;
        }

        .back-btn {
            position: absolute;
            top: 931px;
            left: 33px;
            width: 134px;
            height: 61px;
            background: #000;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="page">

    <h1 class="logo">Bridge</h1>

    <div class="card-area">
        <a class="card" href="signup_admin.html">
            <span class="card-hint">Your?</span>
            <span class="card-title">Admin</span>
            <span class="card-subtitle">(대표자)</span>
        </a>

        <a class="card" href="signup_staff.html">
            <span class="card-hint">Your?</span>
            <span class="card-title">Staff</span>
            <span class="card-subtitle">(관리자)</span>
        </a>
    </div>

    <a class="back-btn" href="login.html">←</a>

</div>

</body>
</html>
