<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bridge — Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Inter:wght@600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #bdfffc;
            font-family: 'Inter', sans-serif;
        }

        .page {
            width: 1440px;
            max-width: 100%;
            min-height: 1024px;
            margin: 0 auto;
            position: relative;
        }

        /* 로고 */
        .logo {
            position: absolute;
            top: 11px;
            left: 13px;
            font-family: 'Italiana', serif;
            font-size: 48px;
            font-weight: 400;
            letter-spacing: -0.96px;
            line-height: 1.2;
            color: #000;
        }

        /* 환영 문구 */
        .welcome-text {
            position: absolute;
            top: 323px;
            left: 50%;
            transform: translateX(-50%);
            width: 978px;
            font-size: 128px;
            font-weight: 600;
            letter-spacing: -2.56px;
            line-height: 1.2;
            color: #000;
            text-align: center;
        }

        /* Login 버튼 */
        .login-btn {
            position: absolute;
            top: 729px;
            left: 666px;
            font-size: 36px;
            font-weight: 600;
            letter-spacing: -0.72px;
            line-height: 1.2;
            color: #000;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
        }

        .login-btn:hover {
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="page">

    <h1 class="logo">Bridge</h1>

    <p class="welcome-text">Welcome to the Bridge Family!</p>

    <a class="login-btn" href="login.html">Login →</a>

</div>

</body>
</html>
