<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bridge — Staff Sign up</title>
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Inter:wght@600&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #bdfffc; font-family: 'Inter', sans-serif; }

        .page {
            width: 1440px; max-width: 100%;
            min-height: 1024px; margin: 0 auto; position: relative;
        }

        .logo {
            position: absolute; top: 11px; left: 13px;
            font-family: 'Italiana', serif; font-size: 48px;
            font-weight: 400; letter-spacing: -0.96px; color: #000;
        }

        .title {
            position: absolute; top: 95px; left: 358px;
            font-size: 96px; font-weight: 600;
            letter-spacing: -1.92px; color: #000; width: 785px;
        }

        .label {
            position: absolute; font-size: 36px; font-weight: 600;
            letter-spacing: -0.72px; color: #000;
        }

        .input-field {
            position: absolute; width: 470px; height: 71px;
            background: #fff; border: 2px solid #000; border-radius: 20px;
            padding: 0 24px; font-family: 'Inter', sans-serif;
            font-size: 24px; font-weight: 600; color: #000; outline: none;
        }

        .input-field::placeholder { color: rgba(0, 0, 0, 0.09); }
        .input-field:focus { box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08); }

        .label-church-code  { top: 344px; left: 74px; }
        .input-church-code  { top: 436px; left: 140px; }

        .label-church-title { top: 558px; left: 74px; }
        .input-church-title { top: 637px; left: 140px; }

        .label-department   { top: 759px; left: 74px; }
        .input-department   { top: 829px; left: 140px; }

        .label-access-code  { top: 344px; left: 692px; }
        .input-access-code  { top: 436px; left: 809px; }

        .label-profile {
            position: absolute; top: 558px; left: 692px;
            font-size: 36px; font-weight: 600;
            letter-spacing: -0.72px; color: #000;
        }

        .upload-box {
            position: absolute; top: 637px; left: 928px;
            width: 232px; height: 278px;
            background: #fff; border: 2px dashed #000;
            border-radius: 12px; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; cursor: pointer;
        }

        .upload-box input[type="file"] { display: none; }
        .upload-arrow { font-size: 40px; color: #bdfffc; font-weight: 600; }

        .back-btn {
            position: absolute; top: 931px; left: 33px;
            width: 134px; height: 61px; background: #000;
            border: none; border-radius: 30px; color: #fff;
            font-size: 28px; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            text-decoration: none; transition: background 0.15s;
        }

        .back-btn:hover { background: #333; }

        .next-btn {
            position: absolute; top: 931px; left: 1288px;
            width: 134px; height: 61px; background: #000;
            border: none; border-radius: 30px; color: #fff;
            font-size: 28px; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            text-decoration: none; transition: background 0.15s;
        }

        .next-btn:hover { background: #333; }
    </style>
</head>
<body>
<div class="page">
    <h1 class="logo">Bridge</h1>
    <h2 class="title">Church Identity</h2>

    <label class="label label-church-code" for="church-code">Church Code(교회 코드)</label>
    <input class="input-field input-church-code" id="church-code" type="text" placeholder="Value" />

    <label class="label label-church-title" for="church-title">Church Title(교회 직분)</label>
    <input class="input-field input-church-title" id="church-title" type="text" placeholder="Value" />

    <label class="label label-department" for="department">Department(부서)</label>
    <input class="input-field input-department" id="department" type="text" placeholder="Value" />

    <label class="label label-access-code" for="access-code">Access Code(가입 코드)</label>
    <input class="input-field input-access-code" id="access-code" type="text" placeholder="Value" />

    <p class="label-profile">Profile Image (프로필 사진)</p>
    <label class="upload-box" for="file-upload">
        <span class="upload-arrow">↑</span>
        <input id="file-upload" type="file" accept="image/*" />
    </label>

    <a class="back-btn" href="signup.html">←</a>
    <a class="next-btn" href="signup_staff2.html">→</a>

</div>
</body>
</html>
