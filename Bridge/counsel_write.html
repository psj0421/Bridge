<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bridge — 면담 작성</title>
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; font-family: 'Inter', sans-serif; }

        .header {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 135px;
            background: #f5f5f5; border: 2px solid #000;
            z-index: 100; display: flex; align-items: center; padding-left: 20px;
        }

        .header-title { font-size: 64px; font-weight: 600; color: #000; }

        .page { width: 1440px; max-width: 100%; margin: 0 auto; position: relative; padding-top: 175px; padding-bottom: 60px; }

        /* 버튼들 */
        .btn-cancel {
            position: absolute; top: 197px; left: 1173px;
            width: 110px; height: 43px;
            background: #e0e0e0; border: 1px solid #b3b3b3; border-radius: 22px;
            font-size: 20px; font-weight: 600; color: #4d4d4d;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .btn-save {
            position: absolute; top: 197px; left: 1295px;
            width: 110px; height: 43px;
            background: #000; border: none; border-radius: 22px;
            font-size: 20px; font-weight: 600; color: #fff;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .btn-save:hover { background: #333; }

        /* 메인 박스 */
        .main-box {
            position: absolute; top: 267px; left: 75px;
            width: 1325px;
            border: 1px solid #000; border-radius: 20px;
            background: #fff; padding: 24px 20px 32px;
        }

        .main-title {
            font-size: 28px; font-weight: 600; color: #000;
            margin-bottom: 20px;
        }

        .main-divider {
            height: 1px; background: #e0e0e0; margin-bottom: 24px;
        }

        /* 필드 영역 */
        .field-row {
            display: flex; gap: 20px; margin-bottom: 20px;
        }

        .field {
            display: flex; flex-direction: column; gap: 8px;
            margin-bottom: 20px;
        }

        .field-label {
            font-size: 18px; font-weight: 600; color: #808080;
        }

        .field-input {
            width: 100%; height: 54px;
            background: #f9f9f9; border: 1px solid #d1d1d1; border-radius: 12px;
            padding: 0 20px;
            font-family: 'Inter', sans-serif;
            font-size: 18px; font-weight: 400; color: #000;
            outline: none;
        }

        .field-input::placeholder { color: #bfbfbf; }
        .field-input:focus { border-color: #000; }

        .field-date { width: 400px; }
        .field-writer { flex: 1; }

        .field-textarea {
            width: 100%;
            background: #f9f9f9; border: 1px solid #d1d1d1; border-radius: 12px;
            padding: 16px 20px;
            font-family: 'Inter', sans-serif;
            font-size: 18px; font-weight: 400; color: #000;
            outline: none; resize: none;
        }

        .field-textarea::placeholder { color: #bfbfbf; }
        .field-textarea:focus { border-color: #000; }
    </style>
</head>
<body>

<div class="header">
    <h1 class="header-title">면담 작성</h1>
</div>

<div class="page">

    <button class="btn-cancel" onclick="history.back()">취소</button>
    <button class="btn-save" onclick="history.back()">저장</button>

    <!-- 메인 박스 -->
    <div class="main-box">
        <p class="main-title">새 면담 기록</p>
        <div class="main-divider"></div>

        <!-- 날짜 + 작성자 -->
        <div class="field-row">
            <div class="field field-date" style="margin-bottom: 0;">
                <label class="field-label">면담 날짜</label>
                <input class="field-input" type="text" placeholder="YYYY/MM/DD" />
            </div>
            <div class="field field-writer" style="margin-bottom: 0;">
                <label class="field-label">작성자</label>
                <input class="field-input" type="text" placeholder="이름" />
            </div>
        </div>

        <!-- 면담 제목 -->
        <div class="field" style="margin-top: 20px;">
            <label class="field-label">면담 제목</label>
            <input class="field-input" type="text" placeholder="면담 제목을 입력하세요" />
        </div>

        <!-- 면담 내용 -->
        <div class="field">
            <label class="field-label">면담 내용</label>
            <textarea class="field-textarea" rows="14" placeholder="면담 내용을 자세히 작성해주세요"></textarea>
        </div>

        <!-- 기도 제목 -->
        <div class="field" style="margin-bottom: 0;">
            <label class="field-label">기도 제목</label>
            <textarea class="field-textarea" rows="5" placeholder="기도 제목을 입력하세요"></textarea>
        </div>

    </div>

</div>

</body>
</html>
