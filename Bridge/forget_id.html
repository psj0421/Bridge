<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bridge — Forget ID</title>
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Inter:wght@600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #bdfffc;
            font-family: 'Inter', sans-serif;
        }

        .page {
            width: 1440px;
            max-width: 100%;
            min-height: 1024px;
            margin: 0 auto;
            position: relative;
        }

        .logo {
            position: absolute;
            top: 11px;
            left: 13px;
            font-family: 'Italiana', serif;
            font-size: 48px;
            font-weight: 400;
            letter-spacing: -0.96px;
            line-height: 1.2;
            color: #000;
        }

        .title {
            position: absolute;
            top: 93px;
            left: 494px;
            font-size: 96px;
            font-weight: 600;
            letter-spacing: -1.92px;
            line-height: 1.2;
            color: #000;
            width: 633px;
        }

        .label {
            position: absolute;
            font-size: 36px;
            font-weight: 600;
            letter-spacing: -0.72px;
            line-height: 1.2;
            color: #000;
        }

        .input-field {
            position: absolute;
            width: 350px;
            height: 71px;
            left: 550px;
            background: #fff;
            border: 2px solid #000;
            border-radius: 20px;
            padding: 0 24px;
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 600;
            color: #000;
            outline: none;
        }

        .input-field::placeholder {
            color: rgba(0, 0, 0, 0.09);
        }

        .input-field:focus {
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08);
        }

        /* Church Code */
        .label-church-code { top: 348px; left: 412px; }
        .input-church-code { top: 417px; }

        /* Name */
        .label-name { top: 521px; left: 416px; }
        .input-name { top: 590px; }

        /* DOB */
        .label-dob { top: 694px; left: 416px; }
        .input-dob { top: 763px; }

        /* 뒤로가기 버튼 */
        .back-btn {
            position: absolute;
            top: 931px;
            left: 33px;
            width: 134px;
            height: 61px;
            background: #000;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background 0.15s;
        }

        .back-btn:hover { background: #333; }

        /* 다음 버튼 */
        .next-btn {
            position: absolute;
            top: 931px;
            left: 1284px;
            width: 134px;
            height: 61px;
            background: #000;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background 0.15s;
        }

        .next-btn:hover { background: #333; }
    </style>
</head>
<body>

<div class="page">

    <h1 class="logo">Bridge</h1>
    <h2 class="title">Forget ID?</h2>

    <!-- Church Code -->
    <label class="label label-church-code" for="church-code">Church Code(교회 코드)</label>
    <input class="input-field input-church-code" id="church-code" type="text" placeholder="Value" />

    <!-- Name -->
    <label class="label label-name" for="name">Name(이름)</label>
    <input class="input-field input-name" id="name" type="text" placeholder="Value" />

    <!-- DOB -->
    <label class="label label-dob" for="dob">DOB(생년월일)</label>
    <input class="input-field input-dob" id="dob" type="text" placeholder="YYYY-MM-DD" />

    <!-- 버튼 -->
    <a class="back-btn" href="login.html">←</a>
    <a class="next-btn" href="answer_id.html">→</a>

</div>

</body>
</html>
