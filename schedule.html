<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bridge — Schedules</title>
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      font-family: 'Inter', sans-serif;
    }

    .header {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 135px;
      background: #f5f5f5;
      border-bottom: 2px solid #000;
      border-right: 2px solid #000;
      border-top: 2px solid #000;
      border-radius: 0 20px 0 0;
      z-index: 100;
      display: flex;
      align-items: center;
      padding-left: 52px;
    }

    .header-title {
      font-size: 64px;
      font-weight: 600;
      letter-spacing: -1.28px;
      color: #000;
    }

    .page {
      width: 1440px;
      max-width: 100%;
      margin: 0 auto;
      position: relative;
      min-height: 1080px;
    }

    /* 컬럼 헤더 */
    .col-header {
      position: absolute;
      top: 182px;
    }

    .col-day     { position: absolute; top: 182px; left: 81px;  font-size: 24px; font-weight: 600; letter-spacing: -0.48px; color: #000; }
    .col-time    { position: absolute; top: 184px; left: 245px; font-size: 24px; font-weight: 600; letter-spacing: -0.48px; color: #000; }
    .col-program { position: absolute; top: 184px; left: 446px; font-size: 24px; font-weight: 600; letter-spacing: -0.48px; color: #000; }
    .col-role    { position: absolute; top: 185px; left: 747px; font-size: 24px; font-weight: 600; letter-spacing: -0.48px; color: #000; }

    /* 수정 버튼 */
    .btn-edit-header {
      position: absolute;
      top: 188px;
      left: 937px;
      width: 91px;
      height: 34px;
      background: #d9d9d9;
      border: 1px solid #000;
      border-radius: 20px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.4px;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 일정 행 */
    .schedule-row {
      position: absolute;
      width: 981px;
      left: 57px;
      height: 77px;
      border: 1px solid #000;
      border-radius: 20px;
      background: #fff;
    }

    .row-1 { top: 244px; }
    .row-2 { top: 355px; }
    .row-3 { top: 473px; }
    .row-4 { top: 591px; }

    /* 행 안의 텍스트 */
    .row-date    { position: absolute; font-size: 24px; font-weight: 600; letter-spacing: -0.48px; color: #000; }
    .row-time    { position: absolute; font-size: 24px; font-weight: 600; letter-spacing: -0.48px; color: #000; }
    .row-program { position: absolute; font-size: 24px; font-weight: 600; letter-spacing: -0.48px; color: #000; }
    .row-role    { position: absolute; font-size: 24px; font-weight: 600; letter-spacing: -0.48px; color: #000; }

    /* 행 1 */
    .r1-date    { top: 268px; left: 110px; }
    .r1-time    { top: 268px; left: 245px; }
    .r1-program { top: 268px; left: 441px; }
    .r1-role    { top: 268px; left: 735px; }

    /* 행 2 */
    .r2-date    { top: 379px; left: 110px; }
    .r2-time    { top: 379px; left: 242px; }
    .r2-program { top: 381px; left: 461px; }
    .r2-role    { top: 379px; left: 745px; }

    /* 행 3 */
    .r3-date    { top: 497px; left: 110px; }
    .r3-time    { top: 498px; left: 242px; }
    .r3-program { top: 499px; left: 444px; }
    .r3-role    { top: 500px; left: 747px; }

    /* 행 4 */
    .r4-date    { top: 615px; left: 106px; }
    .r4-time    { top: 612px; left: 242px; }
    .r4-program { top: 612px; left: 461px; }
    .r4-role    { top: 615px; left: 732px; }

    /* 다음달 주요일정 박스 */
    .next-box {
      position: absolute;
      top: 736px;
      left: 61px;
      width: 585px;
      height: 223px;
      border: 1px solid #000;
      border-radius: 20px;
      background: #fff;
    }

    .next-title {
      position: absolute;
      top: 764px;
      left: 90px;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.48px;
      color: #000;
    }

    .next-item {
      position: absolute;
      top: 825px;
      left: 113px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.4px;
      color: rgba(0, 0, 0, 0.6);
    }

    .btn-edit-next {
      position: absolute;
      top: 904px;
      left: 497px;
      width: 121px;
      height: 34px;
      background: #d9d9d9;
      border: 1px solid #000;
      border-radius: 20px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.4px;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 메모장 박스 */
    .memo-box {
      position: absolute;
      top: 736px;
      left: 801px;
      width: 375px;
      height: 223px;
      border: 1px solid #000;
      border-radius: 20px;
      background: #fff;
    }

    .memo-title {
      position: absolute;
      top: 758px;
      left: 829px;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.48px;
      color: #000;
    }

    .btn-edit-memo {
      position: absolute;
      top: 904px;
      left: 1073px;
      width: 91px;
      height: 35px;
      background: #d9d9d9;
      border: 1px solid #000;
      border-radius: 20px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.4px;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 뒤로가기 버튼 */
    .back-btn {
      position: absolute;
      top: 1005px;
      left: 1278px;
      width: 102px;
      height: 43px;
      background: #000;
      border: 2px solid #000;
      border-radius: 30px;
      color: #fff;
      font-size: 24px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .back-btn:hover { background: #333; }
  </style>
</head>
<body>

<div class="header">
  <h1 class="header-title">Schedules</h1>
</div>

<div class="page">

  <!-- 컬럼 헤더 -->
  <span class="col-day">day/date</span>
  <span class="col-time">Time</span>
  <span class="col-program">Program</span>
  <span class="col-role">Role</span>
  <button class="btn-edit-header">수정</button>

  <!-- 일정 행 1 -->
  <div class="schedule-row row-1"></div>
  <span class="row-date r1-date">5/3</span>
  <span class="row-time r1-time">11:00</span>
  <span class="row-program r1-program">학생부 예배</span>
  <span class="row-role r1-role">찬양인도</span>

  <!-- 일정 행 2 -->
  <div class="schedule-row row-2"></div>
  <span class="row-date r2-date">5/3</span>
  <span class="row-time r2-time">14:30</span>
  <span class="row-program r2-program">저녁예배</span>
  <span class="row-role r2-role">코러스</span>

  <!-- 일정 행 3 -->
  <div class="schedule-row row-3"></div>
  <span class="row-date r3-date">5/3</span>
  <span class="row-time r3-time">16:30</span>
  <span class="row-program r3-program">찬양팀 연습</span>
  <span class="row-role r3-role">코러스</span>

  <!-- 일정 행 4 -->
  <div class="schedule-row row-4"></div>
  <span class="row-date r4-date">5/3</span>
  <span class="row-time r4-time">18:00</span>
  <span class="row-program r4-program">풋살클럽</span>
  <span class="row-role r4-role">경기진행</span>

  <!-- 다음달 주요일정 -->
  <div class="next-box"></div>
  <p class="next-title">다음달 주요일정</p>
  <p class="next-item">6/7  청년부 행사</p>
  <button class="btn-edit-next">수정</button>

  <!-- 메모장 -->
  <div class="memo-box"></div>
  <p class="memo-title">메모장</p>
  <button class="btn-edit-memo">수정</button>

  <!-- 뒤로가기 -->
  <a class="back-btn" href="home.html">←</a>

</div>

</body>
</html>
