<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bridge — Your Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Inter:wght@600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #bdfffc;
            font-family: 'Inter', sans-serif;
        }

        .page {
            width: 1440px;
            max-width: 100%;
            min-height: 1024px;
            margin: 0 auto;
            position: relative;
        }

        .logo {
            position: absolute;
            top: 11px;
            left: 13px;
            font-family: 'Italiana', serif;
            font-size: 48px;
            font-weight: 400;
            letter-spacing: -0.96px;
            line-height: 1.2;
            color: #000;
        }

        .title {
            position: absolute;
            top: 146px;
            left: 0;
            right: 0;
            font-size: 96px;
            font-weight: 600;
            letter-spacing: -1.92px;
            line-height: 1.2;
            color: #000;
            text-align: center;
        }

        .message-en {
            position: absolute;
            top: 486px;
            left: 0;
            right: 0;
            font-size: 36px;
            font-weight: 600;
            letter-spacing: -0.72px;
            line-height: 1.2;
            color: #000;
            text-align: center;
        }

        .message-kr {
            position: absolute;
            top: 546px;
            left: 0;
            right: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.56px;
            line-height: 1.2;
            color: rgba(0, 0, 0, 0.45);
            text-align: center;
        }

        .login-btn {
            position: absolute;
            top: 931px;
            left: 1284px;
            width: 134px;
            height: 61px;
            background: #000;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background 0.15s;
        }

        .login-btn:hover { background: #333; }
    </style>
</head>
<body>

<div class="page">

    <h1 class="logo">Bridge</h1>

    <h2 class="title">Your Password</h2>

    <p class="message-en">Your temporary password has been sent to your email.</p>
    <p class="message-kr">(임시 비밀번호가 귀하의 이메일로 발송되었습니다.)</p>

    <a class="login-btn" href="login.html">Login</a>

</div>

</body>
</html>
