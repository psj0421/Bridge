<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bridge — Forget Church Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Inter:wght@600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #bdfffc;
            font-family: 'Inter', sans-serif;
        }

        .page {
            width: 1440px;
            max-width: 100%;
            min-height: 1024px;
            margin: 0 auto;
            position: relative;
        }

        /* 로고 */
        .logo {
            position: absolute;
            top: 11px;
            left: 13px;
            font-family: 'Italiana', serif;
            font-size: 48px;
            font-weight: 400;
            letter-spacing: -0.96px;
            line-height: 1.2;
            color: #000;
        }

        /* 타이틀 */
        .title {
            position: absolute;
            top: 98px;
            left: 251px;
            font-size: 96px;
            font-weight: 600;
            letter-spacing: -1.92px;
            line-height: 1.2;
            color: #000;
            width: 993px;
        }

        /* 라벨 공통 */
        .label {
            position: absolute;
            font-size: 36px;
            font-weight: 600;
            letter-spacing: -0.72px;
            line-height: 1.2;
            color: #000;
        }

        /* 입력창 공통 */
        .input-field {
            position: absolute;
            width: 350px;
            height: 71px;
            left: 550px;
            background: #fff;
            border: 2px solid #000;
            border-radius: 20px;
            padding: 0 24px;
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 600;
            color: #000;
            outline: none;
        }

        .input-field::placeholder {
            color: rgba(0, 0, 0, 0.09);
        }

        .input-field:focus {
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08);
        }

        /* Church Name */
        .label-church-name  { top: 348px; left: 377px; }
        .input-church-name  { top: 417px; }

        /* Church Address */
        .label-church-addr  { top: 526px; left: 367px; }
        .input-church-addr  { top: 590px; }

        /* Denomination */
        .label-denomination { top: 690px; left: 377px; }
        .input-denomination { top: 763px; }

        /* 뒤로가기 버튼 */
        .back-btn {
            position: absolute;
            top: 931px;
            left: 33px;
            width: 134px;
            height: 61px;
            background: #000;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background 0.15s;
        }

        .back-btn:hover { background: #333; }

        /* 다음 버튼 */
        .next-btn {
            position: absolute;
            top: 931px;
            left: 1284px;
            width: 134px;
            height: 61px;
            background: #000;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background 0.15s;
        }

        .next-btn:hover { background: #333; }
    </style>
</head>
<body>

<div class="page">

    <h1 class="logo">Bridge</h1>
    <h2 class="title">Forget Church Code?</h2>

    <!-- Church Name -->
    <label class="label label-church-name" for="church-name">Church Name(교회 이름)</label>
    <input class="input-field input-church-name" id="church-name" type="text" placeholder="Value" />

    <!-- Church Address -->
    <label class="label label-church-addr" for="church-addr">Church Adress(교회 주소)</label>
    <input class="input-field input-church-addr" id="church-addr" type="text" placeholder="Value" />

    <!-- Denomination -->
    <label class="label label-denomination" for="denomination">Denomination(교단)</label>
    <input class="input-field input-denomination" id="denomination" type="text" placeholder="Value" />

    <!-- 버튼 -->
    <a class="back-btn" href="login.html">←</a>
    <a class="next-btn" href="answer_church_code.html">→</a>

</div>

</body>
</html>
